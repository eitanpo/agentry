# GoReleaser config. Cut a release locally: see DEVELOPMENT.md "Releasing".
# Validate after edits with `goreleaser check`.
version: 2

project_name: agentry

before:
  hooks:
    - go mod tidy
    # Pre-generate shell completions from source (no built binary needed) so the
    # archive can carry them and the cask can link them at install time — see
    # PRODUCT.md "Shell completion" / "Distribution". Generating here rather than
    # via the cask running the binary avoids executing the unsigned binary at
    # install time (the quarantine hazard the post-install hook strips).
    - mkdir -p completions
    - sh -c 'go run . completion bash > completions/agentry.bash'
    - sh -c 'go run . completion zsh > completions/agentry.zsh'
    - sh -c 'go run . completion fish > completions/agentry.fish'

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Version is canonical in main.go (var Version); the tag overrides it here.
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Setting files replaces GoReleaser's default doc globs, so name them back
    # alongside the generated completion scripts (binaries are included
    # automatically, independent of this list).
    files:
      - README.md
      - LICENSE
      - completions/*

checksum:
  name_template: checksums.txt

# macOS-only cask, pushed to the personal tap. Binaries are unsigned, so the
# post-install hook strips the quarantine attribute that would otherwise block
# the first run. Linux users install via `go install` instead (no cask).
homebrew_casks:
  - name: agentry
    repository:
      owner: eitanpo
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/eitanpo/agentry"
    description: "Render a Claude Code session log into a styled terminal view"
    # Link the completion scripts bundled in the archive into the shell
    # completion dirs on install, so `brew`-installed agentry tab-completes with
    # no extra step. Paths are relative to the extracted archive.
    completions:
      bash: completions/agentry.bash
      zsh: completions/agentry.zsh
      fish: completions/agentry.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentry"]
          end
